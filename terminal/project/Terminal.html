<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #161513;
    --bg-soft:   #1f1d1a;
    --bg-deep:   #0e0d0c;
    --border:    #2f2c28;
    --fg:        #e9e3d4;
    --fg-dim:    #7a7367;
    --accent:    oklch(0.78 0.12 85);   /* warm amber */
    --accent2:   oklch(0.78 0.12 175);  /* cool teal */
    --ok:        oklch(0.78 0.12 145);  /* sage green */
    --err:       oklch(0.70 0.15 25);   /* warm red */
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    background: #0a0908;
    background-image:
      radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 14px 14px;
    background-position: 0 0;
    font-family: "JetBrains Mono", monospace;
    color: var(--fg);
    overflow: hidden;
  }

  #root {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }

  .term-shell {
    width: 100%; max-width: 1280px;
    height: 100%; max-height: 820px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow:
      0 30px 80px rgba(0,0,0,0.5),
      0 0 0 1px rgba(255,255,255,0.02),
      inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .term-titlebar {
    height: 36px;
    display: flex; align-items: center;
    padding: 0 14px;
    background: linear-gradient(to bottom, #1f1d1a, #18161400 100%);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    user-select: none;
  }

  .term-traffic { display: flex; gap: 8px; }
  .term-traffic > div {
    width: 12px; height: 12px; border-radius: 50%;
    border: 0.5px solid rgba(0,0,0,0.25);
  }
  .term-traffic .close   { background: #ff5f57; }
  .term-traffic .min     { background: #febc2e; }
  .term-traffic .max     { background: #28c840; }

  .term-title {
    flex: 1; text-align: center;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px; color: var(--fg-dim);
    letter-spacing: 0.04em;
  }

  .term-body {
    flex: 1; display: flex; min-height: 0;
  }

  /* sidebar */
  .term-side {
    width: 220px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--bg-deep);
    display: flex; flex-direction: column;
    padding: 18px 0;
  }
  .term-side-h {
    padding: 0 18px 14px;
    font-size: 11px;
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    border-bottom: 1px dashed var(--border);
    margin-bottom: 10px;
  }
  .term-side-h .name {
    color: var(--accent);
    font-size: 13px;
    text-transform: none;
    letter-spacing: 0.03em;
    font-weight: 600;
    margin-bottom: 2px;
    display: block;
  }
  .term-side-section {
    padding: 14px 18px 6px;
    font-size: 10.5px;
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }
  .term-tab {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 18px;
    font-size: 13px;
    color: var(--fg-dim);
    cursor: pointer;
    border: none; background: transparent;
    width: 100%; text-align: left;
    font-family: inherit;
    border-left: 2px solid transparent;
    transition: color 0.12s, background 0.12s;
  }
  .term-tab:hover { color: var(--fg); background: rgba(255,255,255,0.02); }
  .term-tab .num { color: var(--fg-dim); font-size: 11px; opacity: 0.6; }
  .term-tab.active {
    color: var(--fg);
    background: rgba(180,160,90,0.06);
    border-left-color: var(--accent);
  }
  .term-tab.active .num { color: var(--accent); opacity: 1; }
  .term-tab .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ok);
    box-shadow: 0 0 6px var(--ok);
  }
  .term-tab.idle .dot { background: var(--fg-dim); box-shadow: none; }

  .term-side-foot {
    margin-top: auto;
    padding: 14px 18px;
    border-top: 1px dashed var(--border);
    font-size: 11px; color: var(--fg-dim);
    line-height: 1.7;
  }
  .term-side-foot .kbd {
    display: inline-block;
    padding: 1px 5px;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--fg);
    font-size: 10px;
    margin-right: 4px;
  }

  /* main pane */
  .term-main {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    background: var(--bg);
  }
  .term-status {
    height: 24px; flex-shrink: 0;
    display: flex; align-items: center;
    padding: 0 18px;
    border-top: 1px solid var(--border);
    background: var(--bg-deep);
    font-size: 11px; color: var(--fg-dim);
    gap: 18px;
  }
  .term-status .seg {
    padding: 0 10px;
    border-right: 1px solid var(--border);
    height: 100%;
    display: flex; align-items: center;
  }
  .term-status .seg:first-child {
    background: var(--accent);
    color: var(--bg);
    font-weight: 600;
  }
  .term-status .grow { flex: 1; }

  /* cursor blink */
  @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  .tcursor { animation: blink 1s steps(1) infinite; }

  @keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }
  .tcursor-dots::after { content: ''; display: inline-block; min-width: 24px; animation: dots 1.4s steps(1) infinite; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2f2c28; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #3d3934; }

  /* selection */
  ::selection { background: var(--accent); color: var(--bg); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="terminal-tabs.jsx"></script>
<script type="text/babel">
const TABS = [
  { id: 'coder',    label: 'Coder',    sub: 'AI · auth/session.ts',  comp: () => <CoderTab /> },
  { id: 'htop',     label: 'HTOP',     sub: 'process monitor',        comp: () => <HtopTab /> },
  { id: 'netgraph', label: 'Netgraph', sub: 'en0 · 184 conns',        comp: () => <NetgraphTab /> },
];

function App() {
  const [active, setActive] = React.useState('coder');

  // keyboard: 1/2/3 to switch tabs (when not focused on input)
  React.useEffect(() => {
    const onKey = (e) => {
      const tag = (e.target.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea') return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (e.key === '1') setActive('coder');
      if (e.key === '2') setActive('htop');
      if (e.key === '3') setActive('netgraph');
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const ActiveComp = TABS.find(t => t.id === active).comp;
  const activeTab = TABS.find(t => t.id === active);

  return (
    <div className="term-shell" data-screen-label="Terminal">
      <div className="term-titlebar">
        <div className="term-traffic">
          <div className="close" /><div className="min" /><div className="max" />
        </div>
        <div className="term-title">terminal — {activeTab.label.toLowerCase()} — 162×42</div>
        <div style={{ width: 52 }} />
      </div>

      <div className="term-body">
        {/* sidebar */}
        <aside className="term-side">
          <div className="term-side-h">
            <span className="name">Terminal</span>
            <span>session · maya@orbit</span>
          </div>

          <div className="term-side-section">Tabs</div>
          {TABS.map((t, i) => (
            <button
              key={t.id}
              className={`term-tab ${active === t.id ? 'active' : 'idle'}`}
              onClick={() => setActive(t.id)}
            >
              <span className="dot" />
              <span style={{ flex: 1 }}>
                <div>{t.label}</div>
                <div style={{ fontSize: 10.5, color: 'var(--fg-dim)', marginTop: 1 }}>{t.sub}</div>
              </span>
              <span className="num">{i + 1}</span>
            </button>
          ))}

          <div className="term-side-section" style={{ marginTop: 16 }}>Recent</div>
          {['~/projects/orbit-api', '~/dotfiles', '~/notes/scratch.md'].map(p => (
            <div key={p} style={{
              padding: '4px 18px', fontSize: 12, color: 'var(--fg-dim)',
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
            }}>{p}</div>
          ))}

          <div className="term-side-foot">
            <div><span className="kbd">1</span><span className="kbd">2</span><span className="kbd">3</span> switch</div>
            <div><span className="kbd">⌘T</span> new tab</div>
            <div><span className="kbd">⌘W</span> close</div>
          </div>
        </aside>

        {/* main pane */}
        <main className="term-main">
          <ActiveComp />
          <div className="term-status">
            <div className="seg">{activeTab.label.toUpperCase()}</div>
            <div className="seg">main ✦</div>
            <div className="seg">UTF-8</div>
            <div className="seg">zsh</div>
            <div className="grow" />
            <div style={{ paddingRight: 12 }}><Clock /></div>
          </div>
        </main>
      </div>
    </div>
  );
}

function Clock() {
  const [t, setT] = React.useState(new Date());
  React.useEffect(() => {
    const id = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  return <span>{t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false })}</span>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
