appId: com.arthurr0.mterminal
productName: mTerminal

directories:
  output: release
  buildResources: build

files:
  - out/**/*
  - build/icon.png
  - package.json
  - "!**/.vscode/*"
  - "!**/{.eslintrc,.prettierrc,tsconfig*.json}"

asar: true
asarUnpack:
  - "**/node_modules/node-pty/**"
  - "**/node_modules/ssh2/**"

linux:
  target:
    - AppImage
    - deb
  category: TerminalEmulator
  icon: build/icon.png
  maintainer: arthurr0
  artifactName: ${productName}_${version}_amd64.${ext}

deb:
  depends:
    - libnotify4
    - libgtk-3-0
  artifactName: ${name}_${version}_amd64.${ext}

win:
  target:
    - nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-setup.${ext}

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
  icon: build/icon.icns
