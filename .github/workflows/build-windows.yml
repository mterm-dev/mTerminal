name: Build Windows installer

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-build

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting package.json version to $VERSION"
          npm version --no-git-tag-version --allow-same-version "$VERSION"

      - name: Rebuild node-pty for Electron
        run: pnpm exec electron-rebuild -f -w node-pty

      - name: Build NSIS installer
        run: pnpm package:win

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          Get-ChildItem -Path release -Filter *-setup.exe -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName release-artifacts/ }
          Get-ChildItem release-artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: release-artifacts/*
          if-no-files-found: error
