name: Build Windows installer

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-build
        with:
          rust-targets: x86_64-pc-windows-msvc

      - name: Build NSIS installer + portable exe
        run: pnpm tauri build --bundles nsis

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-artifacts | Out-Null
          Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *-setup.exe -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName release-artifacts/ }
          if (Test-Path src-tauri/target/release/mTerminal.exe) {
            Copy-Item src-tauri/target/release/mTerminal.exe release-artifacts/mTerminal-x86_64-windows.exe
          }
          Get-ChildItem release-artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          path: release-artifacts/*
          if-no-files-found: error
