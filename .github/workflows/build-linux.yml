name: Build Linux bundles

on:
  workflow_call:

jobs:
  build:
    name: Build Linux bundles
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install-linux-deps

      - uses: ./.github/actions/setup-build

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting package.json version to $VERSION"
          npm version --no-git-tag-version --allow-same-version "$VERSION"

      - name: Rebuild node-pty for Electron
        run: pnpm exec electron-rebuild -f -w node-pty

      - name: Build bundles (AppImage + deb)
        run: pnpm package:linux

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          cp release/*.AppImage release-artifacts/ || true
          cp release/*.deb release-artifacts/ || true
          ls -la release-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-bundles
          path: release-artifacts/*
          if-no-files-found: error
