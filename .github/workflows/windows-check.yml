name: Windows type-check

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  windows-check:
    name: Windows type-check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-build

      - name: TypeScript
        run: pnpm typecheck

      - name: Frontend build
        run: pnpm build
