name: Windows type-check

on:
  workflow_call:

jobs:
  windows-check:
    name: Windows type-check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-build

      - name: TypeScript
        run: pnpm typecheck

      - name: Frontend build
        run: pnpm build
