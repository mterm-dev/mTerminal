name: Build macOS bundles

on:
  workflow_call:

jobs:
  build:
    name: Build macOS bundles
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-build

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/Library/pnpm/store
          key: pnpm-macos-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting package.json version to $VERSION"
          npm version --no-git-tag-version --allow-same-version "$VERSION"

      - name: Rebuild node-pty for Electron
        run: pnpm exec electron-rebuild -f -w node-pty

      - name: Build DMG bundles (arm64 + x64)
        run: pnpm package:mac

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          cp release/*.dmg release-artifacts/ || true
          ls -la release-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-bundles
          path: release-artifacts/*
          if-no-files-found: error
