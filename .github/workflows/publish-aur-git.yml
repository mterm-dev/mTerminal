name: Publish mterminal-git to AUR

on:
  workflow_call:
    secrets:
      AUR_SSH_PRIVATE_KEY:
        required: true

jobs:
  publish:
    name: Publish mterminal-git
    runs-on: ubuntu-22.04
    container:
      image: archlinux:latest
    steps:
      - name: Pacman deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git openssh base-devel sudo curl
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers

      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-aur-ssh
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          git-email: koeckiartur@gmail.com
          git-name: arthurr0

      - name: Push PKGBUILD
        env:
          GIT_SSH_COMMAND: "ssh -i $HOME/.ssh/aur -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          rm -rf /tmp/aur-git
          git clone ssh://aur@aur.archlinux.org/mterminal-git.git /tmp/aur-git
          cp packaging/PKGBUILD /tmp/aur-git/PKGBUILD
          cd /tmp/aur-git
          chown -R builder:builder .
          sudo -u builder makepkg --printsrcinfo > .SRCINFO
          if [ -n "$(git status --porcelain)" ]; then
            git add PKGBUILD .SRCINFO
            git commit -m "release $VERSION"
            git push
          else
            echo "no PKGBUILD changes for mterminal-git"
          fi
