name: Lint & type-check

on:
  workflow_call:

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/install-linux-deps

      - uses: ./.github/actions/setup-build

      - name: TypeScript
        run: pnpm typecheck
