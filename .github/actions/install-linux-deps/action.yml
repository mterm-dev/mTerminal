name: Install Linux build deps
description: Install apt packages required to build Tauri on Ubuntu.

inputs:
  extras:
    description: Extra apt packages (space-separated)
    default: ""

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libssl-dev \
          libxdo-dev \
          build-essential \
          curl \
          wget \
          file \
          patchelf \
          ${{ inputs.extras }}
