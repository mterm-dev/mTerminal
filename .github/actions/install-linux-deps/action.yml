name: Install Linux build deps
description: Install apt packages required to build Electron bundles on Ubuntu.

inputs:
  extras:
    description: Extra apt packages (space-separated)
    default: ""

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          python3 \
          libxkbfile-dev \
          libsecret-1-dev \
          fakeroot \
          dpkg \
          rpm \
          ${{ inputs.extras }}
